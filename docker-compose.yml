services:
  # ---------------------------
  # LLM runtime (GPU PC)
  # ---------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "11434:11434"
    volumes:
      - /mnt/synology/ai/ollama:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility


  # ---------------------------
  # Chat UI dependencies
  # ---------------------------
  openwebui-db:
    image: postgres:16
    container_name: openwebui-db
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - POSTGRES_DB=openwebui
      - POSTGRES_USER=openwebui
      - POSTGRES_PASSWORD=openwebui
    volumes:
      - /mnt/synology/ai/openwebui-db:/var/lib/postgresql/data
    restart: unless-stopped


  # ---------------------------
  # Chat UI
  # ---------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=postgresql://openwebui:openwebui@openwebui-db:5432/openwebui
      - WEBUI_URL=http://openwebui.justinmendoza.net
    volumes:
      - /mnt/synology/ai/openwebui:/app/backend/data
    depends_on:
      - ollama
      - openwebui-db
    restart: unless-stopped
    

  # ---------------------------
  # Paperless-ngx dependencies
  # ---------------------------
  paperless-db:
    image: postgres:16
    container_name: paperless-db
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER=paperless
      - POSTGRES_PASSWORD=paperless
    volumes:
      - /mnt/synology/paperless/db:/var/lib/postgresql/data
    restart: unless-stopped

  paperless-redis:
    image: redis:7
    container_name: paperless-redis
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped

  # gotenberg service that paperless uses for document conversion
  gotenberg:
    image: docker.io/gotenberg/gotenberg:8.25
    container_name: gotenberg
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    env_file: 
      - ./gotenberg/.env
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
  
  # tika service that paperless uses for document text extraction
  tika:
    image: docker.io/apache/tika:latest
    container_name: tika
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    env_file: ./tika/.env

  # ---------------------------
  # Paperless-ngx
  # ---------------------------
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - paperless-db
      - paperless-redis
    ports:
      - "8001:8000"
    environment:
      - PAPERLESS_REDIS=redis://paperless-redis:6379
      - PAPERLESS_DBHOST=paperless-db
      - PAPERLESS_DBNAME=paperless
      - PAPERLESS_DBUSER=paperless
      - PAPERLESS_DBPASS=paperless
      - PAPERLESS_TIME_ZONE=America/New_York
      - PAPERLESS_URL=https://paperless.justinmendoza.net
      - PAPERLESS_CSRF_TRUSTED_ORIGINS=https://paperless.justinmendoza.net
      # Optional: reduces surprises with file permissions on mounted shares
      - USERMAP_UID=1000
      - USERMAP_GID=1000
    volumes:
      - /mnt/synology/paperless/data:/usr/src/paperless/data
      - /mnt/synology/paperless/media:/usr/src/paperless/media
      - /mnt/synology/paperless/export:/usr/src/paperless/export
      - /mnt/synology/paperless/consume:/usr/src/paperless/consume
    restart: unless-stopped

  # ---------------------------
  # Paperless-GPT
  # ---------------------------
  paperless-gpt:
    image: ghcr.io/icereed/paperless-gpt:latest
    container_name: paperless-gpt
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8003:8080"
    env_file: 
      - ./paperless-gpt/.env
    volumes:
      - ./paperless-gpt/prompts:/app/prompts
    depends_on:
      - paperless
      - ollama
    restart: unless-stopped

  # ---------------------------
  # Paperless-AI
  # ---------------------------
  paperless-ai:
    image: ghcr.io/clusterzx/paperless-ai:latest
    container_name: paperless-ai
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8002:3000"
    environment:
      - VECTOR_DB_PATH=/data/vectors
    env_file:
      - ./paperless-ai/.env
    volumes:
      - /mnt/synology/ai/vectors:/data/vectors
      - ./paperless-ai/data:/app/.data
    depends_on:
      - paperless
      - ollama
    restart: unless-stopped


  # ---------------------------
  # Calibre Desktop
  # Full Calibre with DeDRM plugin support
  # ---------------------------
  calibre:
    image: lscr.io/linuxserver/calibre:latest
    container_name: calibre
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8084:8080"  # Web desktop
      - "8085:8081"  # HTTPS (optional)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./calibre/config:/config
      - /mnt/synology/books:/books
    restart: unless-stopped

  # ---------------------------
  # Calibre-Web
  # Lightweight web UI for ebook library
  # ---------------------------
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8083:8083"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - DOCKER_MODS=linuxserver/mods:universal-calibre
    volumes:
      - ./calibre-web/config:/config
      - /mnt/synology/books:/books
    restart: unless-stopped

  # ---------------------------
  # Home Assistant
  # Smart home automation platform
  # ---------------------------
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8123:8123"
    privileged: true            # Required for USB device access
    environment:
      - TZ=America/New_York
    volumes:
      - ./homeassistant/config:/config
    # Uncomment and adjust if using a USB Zigbee/Z-Wave stick:
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    restart: unless-stopped

  # ---------------------------
  # Mosquitto MQTT Broker
  # Required by Zigbee2MQTT
  # ---------------------------
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
    ports:
      - "1883:1883"
    restart: unless-stopped

  # ---------------------------
  # Zigbee2MQTT
  # Zigbee to MQTT bridge for smart home devices
  # ---------------------------
  zigbee2mqtt:
    image: koenkk/zigbee2mqtt
    container_name: zigbee2mqtt
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - ./zigbee2mqtt-data:/app/data
      - /run/udev:/run/udev:ro
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    depends_on:
      - mosquitto
    restart: unless-stopped
    ports:
      - "8090:8080"

  # ---------------------------
  # Plex Media Server
  # GPU-accelerated media streaming
  # ---------------------------
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    network_mode: host
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    env_file:
      - ./plex/.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    volumes:
      - ./plex/data:/config
      - /mnt/media:/media
      - /tmp/plex-transcode:/transcode
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ---------------------------
  # Radarr
  # Movie management & automation
  # ---------------------------
  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "7878:7878"
    env_file:
      - ./radarr/.env
    volumes:
      - ./radarr/data:/config
      - /mnt/media:/media
    restart: unless-stopped

  # ---------------------------
  # Sonarr
  # TV show management & automation
  # ---------------------------
  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8989:8989"
    env_file:
      - ./sonarr/.env
    volumes:
      - ./sonarr/data:/config
      - /mnt/media:/media
    restart: unless-stopped

  # ---------------------------
  # Prowlarr
  # Indexer manager for Radarr/Sonarr
  # ---------------------------
  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "9696:9696"
    env_file:
      - ./prowlarr/.env
    volumes:
      - ./prowlarr/data:/config
    restart: unless-stopped

  # ---------------------------
  # Bazarr
  # Subtitle auto-downloader
  # ---------------------------
  bazarr:
    image: linuxserver/bazarr:latest
    container_name: bazarr
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "6767:6767"
    env_file:
      - ./bazarr/.env
    volumes:
      - ./bazarr/data:/config
      - /mnt/media:/media
    restart: unless-stopped

  # ---------------------------
  # SABnzbd
  # Usenet download client
  # ---------------------------
  sabnzbd:
    image: linuxserver/sabnzbd:latest
    container_name: sabnzbd
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8082:8080"
    env_file:
      - ./sabnzbd/.env
    volumes:
      - ./sabnzbd/data:/config
      - /mnt/media:/media
    restart: unless-stopped

  # ---------------------------
  # qBittorrent
  # Torrent download client
  # ---------------------------
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8081:8080"
    env_file:
      - ./qbittorrent/.env
    volumes:
      - ./qbittorrent/data:/config
      - /mnt/media:/media
    restart: unless-stopped

  # ---------------------------
  # Homepage
  # Service dashboard
  # ---------------------------
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "3001:3000"
    env_file:
      - ./homepage/.env
    volumes:
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # ---------------------------
  # Watchtower
  # Auto-updates containers nightly and cleans up old images
  # ---------------------------
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 3 * * *
      - WATCHTOWER_ROLLING_RESTART=true
      - WATCHTOWER_LABEL_ENABLE=true
      - DOCKER_API_VERSION=1.44

  # ---------------------------
  # Dozzle
  # Optional but helpful log viewer
  # ---------------------------
  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    container_name: dozzle
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    env_file: 
      - ./dozzle/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dozzle/data:/data
    ports:
      - "8080:8080"