---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: n8n-health-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: n8n-health-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: n8n
roleRef:
  kind: ClusterRole
  name: n8n-health-reader
  apiGroup: rbac.authorization.k8s.io
