---
# Open-WebUI Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openwebui-http
  namespace: docker-services
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: openwebui.justinmendoza.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openwebui
                port:
                  number: 80

